		<script>
		console.log(document.querySelector(".gamesbutton"))
			class Tab {
				constructor(button, content) {
					this.button = button;
					this.content = content;
					button.addEventListener("click", function (e) {
						for (const tab of tabs) {
							if (button == tab.button) {
								tab.content.className = "shown";
							}
							else {
								tab.content.className = "hidden";
							}
						}
					});
				}
				
			}
			var tabs = [];
			tabs.push(
				new Tab(document.querySelector("#gamesbutton"), document.querySelector("#games")),
				new Tab(document.querySelector("#artbutton"), document.querySelector("#art")),
				new Tab(document.querySelector("#musicbutton"), document.querySelector("#music")),
			)
		</script>
